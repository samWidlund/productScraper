name: productScraper Workflow
on: 
  push:
    branches:
      - main

  schedule:
    - cron: '30  10  *  *  *'

  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Marketplace to fetch'
        required: false
        default: 'all'
        type: choice
        options:
        - blocket
        - ebay
        - facebook
        - tradera
        - vinted

      search_term:
        description: 'search_term'
        required: false
        type: string

jobs:
  fetch-tradera:
    runs-on: ubuntu-latest
    environment: telegramApi
    env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_EMAIL: ${{ secrets.SUPABASE_EMAIL }}
        SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install tradera_api
        run: pip install tradera_api python-dotenv requests supabase
      
      - name: Run tradera_marketplace.py
        run: python fetch/tradera/tradera_marketplace.py

  fetch-facebook:
    runs-on: ubuntu-latest
    environment: telegramApi
    env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_EMAIL: ${{ secrets.SUPABASE_EMAIL }}
        SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install requirements
        run: pip install -r requirements.txt
      
      - name: Run fb_marketplace.py
        run: python fetch/facebook/fb_marketplace.py

  fetch-blocket:
    runs-on: ubuntu-latest
    environment: telegramApi
    env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_EMAIL: ${{ secrets.SUPABASE_EMAIL }}
        SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install requirements
        run: pip install -r requirements.txt
      
      - name: Run blocket_marketplace.py
        run: python fetch/blocket/blocket_marketplace.py

  fetch-ebay:
    runs-on: ubuntu-latest
    environment: telegramApi
    env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_EMAIL: ${{ secrets.SUPABASE_EMAIL }}
        SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
        EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install requirements
        run: pip install -r requirements.txt
      
      - name: Run ebay_marketplace.py
        run: python fetch/ebay/ebay_marketplace.py

  fetch-vinted:
    runs-on: ubuntu-latest
    environment: telegramApi
    env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_EMAIL: ${{ secrets.SUPABASE_EMAIL }}
        SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install requirements
        run: pip install -r requirements.txt
      
      - name: Run vinted_marketplace.py
        run: python fetch/vinted/vinted_marketplace.py